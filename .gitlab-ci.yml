# GitLab CI/CD — HELIX Agile Portal
# Builds Tauri 2.x desktop app for macOS and Windows.
#
# Runner prerequisites:
#   Both:    Node.js 20+, Rust stable (≥ 1.77)
#   macOS:   Xcode Command Line Tools, glab CLI (auto-installed via Homebrew)
#   Windows: Visual Studio Build Tools (C++ desktop workload)
#
# Workflow:
#   MR pipeline  → typecheck only (fast gate)
#   Tag v*       → full platform builds + GitLab release
#
# Runner tags expected: "macos", "windows"
# © Edmund Wallner - Mercedes-Benz AG

stages:
  - check
  - build
  - release

variables:
  CARGO_INCREMENTAL: "0"

# ── Merge-request gate ───────────────────────────────────

typecheck:
  stage: check
  tags: [macos]
  script:
    - npm ci
    - npx tsc --noEmit
  rules:
    - if: $CI_MERGE_REQUEST_IID

# ── Platform builds (tag push only) ─────────────────────

build:macos:
  stage: build
  tags: [macos]
  script:
    - npm ci
    - npm run tauri:build
  artifacts:
    paths:
      - src-tauri/target/release/bundle/dmg/*.dmg
    expire_in: 90 days
  cache:
    key: cargo-macos
    paths:
      - src-tauri/target/release/deps
      - src-tauri/target/release/build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build:windows:
  stage: build
  tags: [windows, shared]
  script:
    - npm ci
    - npm run tauri:build -- --bundles none
  artifacts:
    paths:
      - src-tauri/target/release/helix-agile-portal.exe
    expire_in: 90 days
  cache:
    key: cargo-windows
    paths:
      - src-tauri/target/release/deps
      - src-tauri/target/release/build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ── GitLab release (created automatically on tag) ───────
# Uses glab CLI (>= 1.58.0) to create the release and
# upload installer binaries from the build stage artifacts.

release:
  stage: release
  tags: [macos]
  needs:
    - build:macos
    - build:windows
  variables:
    GITLAB_TOKEN: ${CI_JOB_TOKEN}
    GITLAB_HOST: ${CI_SERVER_HOST}
  before_script:
    - command -v glab >/dev/null 2>&1 || brew install glab
  script:
    - |
      ASSETS=()
      for f in src-tauri/target/release/bundle/dmg/*.dmg \
               src-tauri/target/release/helix-agile-portal.exe; do
        [ -f "$f" ] && ASSETS+=("$f")
      done
      echo "Uploading ${#ASSETS[@]} installer(s) for ${CI_COMMIT_TAG}"
      glab release create "${CI_COMMIT_TAG}" "${ASSETS[@]}" \
        --name "HELIX Agile Portal ${CI_COMMIT_TAG}" \
        --notes "Desktop installers for macOS and Windows."
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
