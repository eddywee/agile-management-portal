# GitLab CI/CD — HELIX Agile Portal
# Builds Tauri 2.x desktop app for macOS and Windows.
#
# Runner prerequisites:
#   Both:    Node.js 20+, Rust stable (≥ 1.77)
#   macOS:   Xcode Command Line Tools, glab CLI (auto-installed via Homebrew)
#   Windows: Visual Studio Build Tools (C++ desktop workload)
#
# Workflow:
#   MR pipeline  → typecheck only (fast gate)
#   Tag v*       → full platform builds + GitLab release
#
# Runner tags expected: "macos", "windows"
# © Edmund Wallner - Mercedes-Benz AG

stages:
  - check
  - build
  - release

variables:
  CARGO_INCREMENTAL: "0"

# ── Merge-request gate ───────────────────────────────────

typecheck:
  stage: check
  tags: [macos]
  script:
    - npm ci
    - npx tsc --noEmit
  rules:
    - if: $CI_MERGE_REQUEST_IID

# ── Platform builds (tag push only) ─────────────────────

build:macos:
  stage: build
  tags: [macos]
  script:
    - npm ci
    - npm run tauri:build
  artifacts:
    paths:
      - src-tauri/target/release/bundle/dmg/*.dmg
    expire_in: 90 days
  cache:
    key: cargo-macos
    paths:
      - src-tauri/target/release/deps
      - src-tauri/target/release/build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build:windows:
  stage: build
  tags: [windows, shared]
  script:
    - npm ci
    - npm run tauri:build -- --no-bundle
  artifacts:
    paths:
      - src-tauri/target/release/helix-agile-portal.exe
    expire_in: 90 days
  cache:
    key: cargo-windows
    paths:
      - src-tauri/target/release/deps
      - src-tauri/target/release/build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ── GitLab release (created automatically on tag) ───────
# Creates a release via the GitLab API and uploads installer
# binaries from the build stage artifacts as release links.

release:
  stage: release
  tags: [macos]
  needs:
    - build:macos
    - build:windows
  script:
    - |
      API="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"
      AUTH="JOB-TOKEN: ${CI_JOB_TOKEN}"

      # Create the release
      echo "Creating release ${CI_COMMIT_TAG}..."
      curl --fail --silent --show-error \
        --header "${AUTH}" \
        --header "Content-Type: application/json" \
        --data "{
          \"tag_name\": \"${CI_COMMIT_TAG}\",
          \"name\": \"HELIX Agile Portal ${CI_COMMIT_TAG}\",
          \"description\": \"Desktop installers for macOS and Windows.\"
        }" \
        "${API}/releases"

      echo ""
      echo "Release created. Uploading assets..."

      # Upload each installer and add as a release link
      for f in src-tauri/target/release/bundle/dmg/*.dmg \
               src-tauri/target/release/helix-agile-portal.exe; do
        [ -f "$f" ] || continue
        FILENAME=$(basename "$f")
        echo "  Uploading ${FILENAME}..."

        # Upload to project uploads
        UPLOAD=$(curl --fail --silent --show-error \
          --header "${AUTH}" \
          --form "file=@${f}" \
          "${API}/uploads")

        URL=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['full_path'])")

        # Link upload to the release
        curl --fail --silent --show-error \
          --header "${AUTH}" \
          --header "Content-Type: application/json" \
          --data "{
            \"name\": \"${FILENAME}\",
            \"url\": \"${CI_SERVER_URL}${URL}\",
            \"link_type\": \"package\"
          }" \
          "${API}/releases/${CI_COMMIT_TAG}/assets/links"

        echo ""
      done
      echo "Done — ${CI_COMMIT_TAG} released."
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
