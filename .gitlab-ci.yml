# GitLab CI/CD — HELIX Agile Portal
# Builds Tauri 2.x desktop app for macOS and Windows.
#
# Runner prerequisites:
#   Both:    Node.js 20+, Rust stable (≥ 1.77)
#   macOS:   Xcode Command Line Tools
#   Windows: Visual Studio Build Tools (C++ desktop workload), NSIS 3.x
#
# Workflow:
#   MR pipeline  → typecheck only (fast gate)
#   Tag v*       → full platform builds + GitLab release + updater manifest
#
# Release assets are stored in the GitLab Generic Package Registry
# (CI_JOB_TOKEN has publish access, unlike project uploads).
#
# Auto-update requires CI variables (Settings > CI/CD > Variables):
#   TAURI_SIGNING_PRIVATE_KEY          — signing key (masked, protected)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — key password (masked, protected)
#
# Runner tags expected: "macos", "windows"
# © Edmund Wallner - Mercedes-Benz AG

stages:
  - check
  - build
  - release

variables:
  CARGO_INCREMENTAL: "0"

# ── Merge-request gate ───────────────────────────────────

typecheck:
  stage: check
  tags: [macos]
  script:
    - npm ci
    - npx tsc --noEmit
  rules:
    - if: $CI_MERGE_REQUEST_IID

# ── Platform builds (tag push only) ─────────────────────

build:macos:
  stage: build
  tags: [macos]
  script:
    - npm ci
    - npm run tauri:build
  artifacts:
    paths:
      - src-tauri/target/release/bundle/dmg/*.dmg
      - src-tauri/target/release/bundle/macos/*.tar.gz
      - src-tauri/target/release/bundle/macos/*.tar.gz.sig
    expire_in: 90 days
  cache:
    key: cargo-macos
    paths:
      - src-tauri/target/release/deps
      - src-tauri/target/release/build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

build:windows:
  stage: build
  tags: [windows, shared]
  script:
    - npm ci
    - npm run tauri:build -- --no-bundle
  artifacts:
    paths:
      - src-tauri/target/release/helix-agile-portal.exe
    expire_in: 90 days
  cache:
    key: cargo-windows
    paths:
      - src-tauri/target/release/deps
      - src-tauri/target/release/build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ── GitLab release + updater manifest ────────────────────
# Creates a release via the GitLab API, uploads installer binaries
# as release links, and publishes an update.json manifest for
# the in-app auto-updater (tauri-plugin-updater).

release:
  stage: release
  tags: [macos]
  needs:
    - build:macos
    - build:windows
  script:
    - |
      API="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"
      AUTH="JOB-TOKEN: ${CI_JOB_TOKEN}"
      VERSION="${CI_COMMIT_TAG#v}"
      PKG_URL="${API}/packages/generic/helix-agile-portal/${VERSION}"
      UPDATE_PKG_URL="${API}/packages/generic/helix-agile-portal-update/latest"

      # Create the release
      echo "Creating release ${CI_COMMIT_TAG}..."
      curl --fail --silent --show-error \
        --header "${AUTH}" \
        --header "Content-Type: application/json" \
        --data "{
          \"tag_name\": \"${CI_COMMIT_TAG}\",
          \"name\": \"HELIX Agile Portal ${CI_COMMIT_TAG}\",
          \"description\": \"Desktop installers for macOS and Windows.\"
        }" \
        "${API}/releases"

      echo ""
      echo "Release created. Uploading assets to package registry..."

      # Upload each installer/updater artifact to the Generic Package Registry
      # and add installers as release asset links
      for f in src-tauri/target/release/bundle/dmg/*.dmg \
               src-tauri/target/release/helix-agile-portal.exe \
               src-tauri/target/release/bundle/macos/*.tar.gz \
               src-tauri/target/release/bundle/macos/*.tar.gz.sig; do
        [ -f "$f" ] || continue
        FILENAME=$(basename "$f")
        # Registry filenames must match [A-Za-z0-9._-+], replace spaces
        SAFE_FILENAME=$(echo "$FILENAME" | tr ' ' '-')
        echo "  Uploading ${FILENAME} as ${SAFE_FILENAME}..."

        # PUT to Generic Package Registry
        curl --fail --silent --show-error \
          --header "${AUTH}" \
          --upload-file "$f" \
          "${PKG_URL}/${SAFE_FILENAME}"

        # Only link user-facing installers (dmg, exe) to the release
        case "$FILENAME" in
          *.dmg|*.exe)
            curl --fail --silent --show-error \
              --header "${AUTH}" \
              --header "Content-Type: application/json" \
              --data "{
                \"name\": \"${FILENAME}\",
                \"url\": \"${PKG_URL}/${SAFE_FILENAME}\",
                \"link_type\": \"package\"
              }" \
              "${API}/releases/${CI_COMMIT_TAG}/assets/links"
            ;;
        esac

        echo ""
      done

      # ── Generate and upload update.json for auto-updater ──
      echo "Generating update.json manifest..."
      PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      # Read macOS signature
      MAC_SIG=""
      for sigfile in src-tauri/target/release/bundle/macos/*.tar.gz.sig; do
        [ -f "$sigfile" ] && MAC_SIG=$(cat "$sigfile")
      done

      # Find macOS updater bundle filename
      MAC_BUNDLE=""
      for bundle in src-tauri/target/release/bundle/macos/*.tar.gz; do
        [ -f "$bundle" ] && MAC_BUNDLE=$(basename "$bundle" | tr ' ' '-')
      done

      # Build the update manifest JSON (macOS only — Windows lacks NSIS on shared runner)
      PLATFORMS="{"
      if [ -n "$MAC_SIG" ] && [ -n "$MAC_BUNDLE" ]; then
        PLATFORMS="${PLATFORMS}\"darwin-aarch64\":{\"signature\":\"${MAC_SIG}\",\"url\":\"${PKG_URL}/${MAC_BUNDLE}\"}"
      fi
      PLATFORMS="${PLATFORMS}}"

      UPDATE_JSON="{\"version\":\"${VERSION}\",\"notes\":\"Desktop installers for macOS and Windows.\",\"pub_date\":\"${PUB_DATE}\",\"platforms\":${PLATFORMS}}"

      echo "$UPDATE_JSON" > update.json
      echo "  update.json contents:"
      cat update.json
      echo ""

      # Upload to the well-known updater endpoint (overwrites previous)
      echo "  Uploading update.json..."
      curl --fail --silent --show-error \
        --header "${AUTH}" \
        --upload-file update.json \
        "${UPDATE_PKG_URL}/update.json"

      echo ""
      echo "Done — ${CI_COMMIT_TAG} released with auto-update manifest."
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
