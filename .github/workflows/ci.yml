# CI/CD — Agile Management Portal
# Builds Tauri 2.x desktop app for macOS and Windows.
#
# Workflow:
#   PR pipeline  → lint, format, typecheck, test (fast gate)
#   Tag v*       → full platform builds + GitHub release + updater manifest
#
# Auto-update requires repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — signing key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — key password
#
# © Edmund Wallner

name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    tags: ['v*']

env:
  CARGO_INCREMENTAL: '0'

jobs:
  # ── Pull-request gate ───────────────────────────────────
  quality:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # ── Frontend checks ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: Vitest
        run: npm test

      # ── Rust checks ──
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # ── Platform builds (tag push only) ─────────────────────
  build-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri:build

      # Debug: show what was built
      - name: List build output
        run: |
          echo "=== DMG ==="
          find src-tauri/target/release/bundle/dmg -type f 2>/dev/null || echo "No dmg dir"
          echo "=== macOS updater ==="
          find src-tauri/target/release/bundle/macos -type f 2>/dev/null || echo "No macos dir"

      # Copy artifacts to a flat staging directory, replacing spaces with dots
      # to match GitHub's asset naming (GitHub converts spaces to dots on upload)
      - name: Stage artifacts
        run: |
          mkdir -p staging
          cp src-tauri/target/release/bundle/dmg/*.dmg staging/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/macos/*.tar.gz staging/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/macos/*.tar.gz.sig staging/ 2>/dev/null || true
          cd staging && for f in *' '*; do [ -e "$f" ] && mv "$f" "${f// /.}"; done && cd ..
          echo "=== Staged files ==="
          ls -la staging/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: staging/*

  build-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri:build -- --no-bundle

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging
          cp src-tauri/target/release/agile-management-portal.exe staging/
          ls -la staging/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: staging/*

  # ── GitHub release + updater manifest ────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - name: Generate update.json and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read macOS signature
          MAC_SIG=""
          for sigfile in artifacts/macos-artifacts/*.tar.gz.sig; do
            [ -f "$sigfile" ] && MAC_SIG=$(cat "$sigfile")
          done

          # Find macOS updater bundle filename
          MAC_BUNDLE=""
          for bundle in artifacts/macos-artifacts/*.tar.gz; do
            [ -f "$bundle" ] && MAC_BUNDLE=$(basename "$bundle")
          done

          # Build update manifest (macOS only — Windows lacks bundled installer)
          PLATFORMS="{}"
          if [ -n "$MAC_SIG" ] && [ -n "$MAC_BUNDLE" ]; then
            MAC_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${MAC_BUNDLE// /%20}"
            PLATFORMS=$(jq -n \
              --arg sig "$MAC_SIG" \
              --arg url "$MAC_URL" \
              '{"darwin-aarch64":{"signature":$sig,"url":$url}}')
          fi

          # Fetch release notes from GitHub release (if pre-created)
          NOTES="Desktop installers for macOS and Windows."
          if gh release view "${GITHUB_REF_NAME}" &>/dev/null; then
            RELEASE_BODY=$(gh release view "${GITHUB_REF_NAME}" --json body -q '.body' 2>/dev/null || echo "")
            if [ -n "$RELEASE_BODY" ]; then
              NOTES="$RELEASE_BODY"
            fi
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' > update.json

          echo "update.json contents:"
          cat update.json

          # Collect release assets
          ASSETS=()
          for f in artifacts/macos-artifacts/*.dmg \
                   artifacts/windows-artifacts/*.exe \
                   artifacts/macos-artifacts/*.tar.gz \
                   artifacts/macos-artifacts/*.tar.gz.sig; do
            [ -f "$f" ] && ASSETS+=("$f")
          done
          ASSETS+=(update.json)

          echo "Assets to upload:"
          printf '  %s\n' "${ASSETS[@]}"

          # Upload to existing release (pre-created with notes), or create one
          if gh release view "${GITHUB_REF_NAME}" &>/dev/null; then
            echo "Release ${GITHUB_REF_NAME} exists, uploading assets..."
            gh release upload "${GITHUB_REF_NAME}" "${ASSETS[@]}" --clobber
          else
            echo "Creating release ${GITHUB_REF_NAME}..."
            gh release create "${GITHUB_REF_NAME}" \
              --title "Agile Management Portal ${GITHUB_REF_NAME}" \
              --generate-notes \
              "${ASSETS[@]}"
          fi
