[project]
site_name = "Agile Management Portal"
site_description = "User documentation for the Agile Management Portal desktop application — SAFe FTE allocation tracking."
site_author = "Edmund Wallner"
copyright = "Copyright &copy; Edmund Wallner"
repo_url = "https://github.com/eddywee/agile-management-portal"
repo_name = "eddywee/agile-management-portal"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Dashboard" = "dashboard.md" },
  { "Organization" = "organization.md" },
  { "People" = "people.md" },
  { "Import" = "import.md" },
  { "Settings" = "settings.md" },
  { "Keyboard Shortcuts" = "keyboard-shortcuts.md" },
  { "Updates" = "updates.md" },
]

extra_css = ["extra.css"]

[project.theme]
favicon = "assets/favicon.png"

[project.theme.font]
text = "DM Sans"
code = "JetBrains Mono"

features = [
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.footer",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "content.code.copy",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.theme.icon]
logo = "lucide/layout-dashboard"
