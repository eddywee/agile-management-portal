[project]
site_name = "Agile Management Portal"
site_description = "User documentation for the Agile Management Portal desktop application — SAFe FTE allocation tracking."
site_author = "Edmund Wallner"
copyright = "Copyright &copy; Edmund Wallner"
repo_url = "https://github.com/eddywee/agile-management-portal"
repo_name = "eddywee/agile-management-portal"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Features" = [
    { "Dashboard" = "dashboard.md" },
    { "Organization" = "organization.md" },
    { "People" = "people.md" },
  ] },
  { "Data" = [
    { "CSV Import" = "import.md" },
    { "Data Management" = "data-management.md" },
    { "Cost Rates" = "cost-rates.md" },
  ] },
  { "Configuration" = [
    { "PI Management" = "pi-management.md" },
    { "Settings" = "settings.md" },
  ] },
  { "Reference" = [
    { "Keyboard Shortcuts" = "keyboard-shortcuts.md" },
    { "Updates" = "updates.md" },
  ] },
]

extra_css = ["stylesheets/extra.css"]

markdown_extensions = [
  "admonition",
  "pymdownx.details",
  "pymdownx.superfences",
  "attr_list",
  "md_in_html",
  "def_list",
  { "pymdownx.tabbed" = { alternate_style = true } },
  { "pymdownx.highlight" = { anchor_linenums = true } },
  { "pymdownx.tasklist" = { custom_checkbox = true } },
  { "toc" = { permalink = true } },
]

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/eddywee/agile-management-portal"

[project.theme]
variant = "classic"
custom_dir = "overrides"
favicon = "assets/favicon.png"

features = [
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.top",
  "navigation.footer",
  "search.suggest",
  "search.highlight",
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "toc.follow",
  "header.autohide",
]

[project.theme.font]
text = "DM Sans"
code = "JetBrains Mono"

[project.theme.icon]
logo = "lucide/layout-dashboard"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to dark mode"
